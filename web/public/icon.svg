<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Shield shape (health/protection) -->
  <path d="M256 80c-60 0-120 30-148 56v120c0 90 60 150 148 186 88-36 148-96 148-186V136C376 110 316 80 256 80z"
        fill="white" opacity="0.15"/>
  <!-- Heart outline - centered, clean -->
  <path d="M256 380c-6 0-11-2-15-6-48-46-108-102-108-162 0-42 32-76 72-76 24 0 40 10 51 28 11-18 27-28 51-28 40 0 72 34 72 76 0 60-60 116-108 162-4 4-9 6-15 6z"
        fill="none" stroke="white" stroke-width="12" opacity="0.3"/>
  <!-- Main heart filled -->
  <path d="M256 365c-5 0-9-2-13-5-42-40-95-90-95-143 0-37 28-67 63-67 22 0 36 10 45 26 9-16 23-26 45-26 35 0 63 30 63 67 0 53-53 103-95 143-4 3-8 5-13 5z"
        fill="white" opacity="0.95"/>
  <!-- EKG line - sharp, clean, professional -->
  <path d="M130 260h72l16-50 22 100 22-100 16 50h72"
        fill="none" stroke="url(#bg)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small sparkle dots (AI element) - top right -->
  <circle cx="390" cy="120" r="8" fill="white" opacity="0.9"/>
  <circle cx="420" cy="100" r="5" fill="white" opacity="0.6"/>
  <circle cx="405" cy="145" r="4" fill="white" opacity="0.5"/>
  <!-- Connection lines between sparkles -->
  <line x1="390" y1="120" x2="420" y2="100" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="390" y1="120" x2="405" y2="145" stroke="white" stroke-width="2" opacity="0.4"/>
</svg>
