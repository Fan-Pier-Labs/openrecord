services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: mychart_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d mychart_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  fake-mychart:
    build: ./fake-mychart
    environment:
      FAKE_MYCHART_ACCEPT_ANY: "true"
      PORT: "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/ | grep 302"]
      interval: 2s
      timeout: 5s
      retries: 15

  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_URL: http://localhost:8080
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://testuser:testpass@postgres:5432/mychart_test
      BETTER_AUTH_SECRET: ci-test-secret-not-for-production
      ENCRYPTION_KEY: ci-test-encryption-key-32chars!!
      NEXT_PUBLIC_BASE_URL: http://localhost:8080
      MYCHART_FORCE_HTTP: "true"
      TRUSTED_ORIGINS: http://localhost:8080
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      fake-mychart:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health"]
      interval: 3s
      timeout: 5s
      retries: 20
